<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}P4D Monitor{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{{ url_for('dashboard') }}">
            <img class="logo" src="{{ url_for('static', filename='logo.png') }}" alt="P4D Monitor">
            <span>P4D Monitor</span>
            <span class="version">v{{ app_version }}</span>
        </a>
        <nav>
            {% if session.logged_in %}
                <a href="{{ url_for('dashboard') }}">仪表盘</a>
                <a href="{{ url_for('alerts') }}">告警历史</a>
                <span class="sep">·</span>
                <span class="user">{{ session.user }}</span>
                <a href="{{ url_for('logout') }}" class="logout">退出</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>P4D Monitor v{{ app_version }} · <a href="https://github.com/ziwuxin1/p4d-monitor" target="_blank">GitHub</a></p>
    </footer>

    <script>
    // 把 UTC ISO 时间戳按浏览器本地时区显示。所有 <time class="..."> 标签都自动转
    //   .local-datetime → 完整: 2026-05-01 21:30:25 (America/Los_Angeles)
    //   .local-date     → 只日期
    //   .local-time     → 只时间
    (function convertLocalTimes() {
        const pad = n => String(n).padStart(2, "0");
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        document.querySelectorAll("time[datetime]").forEach(el => {
            const d = new Date(el.getAttribute("datetime"));
            if (isNaN(d)) return;
            const date = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
            const time = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
            if (el.classList.contains("local-datetime"))  el.textContent = `${date} ${time} (${tz})`;
            else if (el.classList.contains("local-date")) el.textContent = date;
            else if (el.classList.contains("local-time")) el.textContent = time;
        });
        // 告警页表头自动加时区(其他页没这元素就跳过)
        const th = document.querySelector(".ts-time-th");
        if (th) th.textContent = `时间 (${tz})`;
    })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
